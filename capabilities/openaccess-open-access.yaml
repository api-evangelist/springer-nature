naftiko: 1.0.0-alpha2
info:
  label: Springer Nature Open Access API — Open Access
  description: 'Springer Nature Open Access API — Open Access. 2 operations. Lead operation: Search Open Access Content (JATS
    Format). Self-contained Naftiko capability covering one Springer Nature business surface.'
  tags:
  - Springer Nature
  - Open Access
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPRINGER_NATURE_API_KEY: SPRINGER_NATURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: openaccess-open-access
    baseUri: https://api.springernature.com/openaccess
    description: Springer Nature Open Access API — Open Access business capability. Self-contained, no shared references.
    resources:
    - name: jats
      path: /jats
      operations:
      - name: searchopenaccessjats
        method: GET
        description: Search Open Access Content (JATS Format)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
        - name: s
          in: query
          type: integer
        - name: p
          in: query
          type: integer
    - name: json
      path: /json
      operations:
      - name: searchopenaccess
        method: GET
        description: Search Open Access Content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: 'Search query supporting field qualifiers: doi:, title:, author:, journal:, issn:, isbn:, subject:,
            keyword:, onlinedatefrom:, onlinedateto:'
        - name: s
          in: query
          type: integer
          description: Start record for pagination (1-based)
        - name: p
          in: query
          type: integer
          description: Number of results per page
        - name: api_key
          in: query
          type: string
    authentication:
      type: apikey
      key: X-ApiKey
      value: '{{env.SPRINGER_NATURE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: openaccess-open-access-rest
    port: 8080
    description: REST adapter for Springer Nature Open Access API — Open Access. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/jats
      name: jats
      description: REST surface for jats.
      operations:
      - method: GET
        name: searchopenaccessjats
        description: Search Open Access Content (JATS Format)
        call: openaccess-open-access.searchopenaccessjats
        with:
          q: rest.q
          s: rest.s
          p: rest.p
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/json
      name: json
      description: REST surface for json.
      operations:
      - method: GET
        name: searchopenaccess
        description: Search Open Access Content
        call: openaccess-open-access.searchopenaccess
        with:
          q: rest.q
          s: rest.s
          p: rest.p
          api_key: rest.api_key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openaccess-open-access-mcp
    port: 9090
    transport: http
    description: MCP adapter for Springer Nature Open Access API — Open Access. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: search-open-access-content-jats
      description: Search Open Access Content (JATS Format)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openaccess-open-access.searchopenaccessjats
      with:
        q: tools.q
        s: tools.s
        p: tools.p
      outputParameters:
      - type: object
        mapping: $.
    - name: search-open-access-content
      description: Search Open Access Content
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openaccess-open-access.searchopenaccess
      with:
        q: tools.q
        s: tools.s
        p: tools.p
        api_key: tools.api_key
      outputParameters:
      - type: object
        mapping: $.
