naftiko: 1.0.0-alpha2
info:
  label: Springer Nature - Scholarly Research Discovery
  description: Workflow capability for discovering and accessing Springer Nature scholarly content. Combines metadata search
    and open access APIs for comprehensive literature discovery. Used by researchers, data scientists, bibliometricians, and
    academic application developers.
  tags:
  - Academic Publishing
  - Bibliometrics
  - Full Text
  - Literature Discovery
  - Open Access
  - Research
  - Scholarly Content
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SPRINGER_NATURE_API_KEY: SPRINGER_NATURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: springer-nature-meta
    baseUri: https://api.springernature.com/meta/v2
    description: Springer Nature versioned metadata API
    authentication:
      type: apikey
      key: X-ApiKey
      value: '{{env.SPRINGER_NATURE_API_KEY}}'
      placement: header
    resources:
    - name: metadata-search
      path: /json
      description: Search Springer Nature publication metadata
      operations:
      - name: search-publications
        method: GET
        description: Search metadata for scholarly publications with field qualifiers
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Query string with field qualifiers (doi:, title:, author:, issn:, subject:)
        - name: s
          in: query
          type: integer
          required: false
          description: Start record (1-based)
        - name: p
          in: query
          type: integer
          required: false
          description: Results per page (max 100)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: springer-nature-openaccess
    baseUri: https://api.springernature.com/openaccess
    description: Springer Nature Open Access content API
    authentication:
      type: apikey
      key: X-ApiKey
      value: '{{env.SPRINGER_NATURE_API_KEY}}'
      placement: header
    resources:
    - name: open-access-search
      path: /json
      description: Search open access publications
      operations:
      - name: search-open-access
        method: GET
        description: Search open access articles and chapters
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Search query with field qualifiers
        - name: s
          in: query
          type: integer
          required: false
          description: Start record (1-based)
        - name: p
          in: query
          type: integer
          required: false
          description: Results per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: scholarly-research-api
    description: Unified REST API for Springer Nature scholarly content discovery.
    resources:
    - path: /v1/publications
      name: publications
      description: Search Springer Nature publication metadata
      operations:
      - method: GET
        name: search-publications
        description: Search all Springer Nature publications by keyword, author, DOI, ISSN, or subject
        call: springer-nature-meta.search-publications
        with:
          q: rest.q
          s: rest.s
          p: rest.p
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/open-access
      name: open-access
      description: Search open access Springer Nature content
      operations:
      - method: GET
        name: search-open-access
        description: Search freely available open access articles and chapters
        call: springer-nature-openaccess.search-open-access
        with:
          q: rest.q
          s: rest.s
          p: rest.p
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: scholarly-research-mcp
    transport: http
    description: MCP server for AI-assisted scholarly literature discovery via Springer Nature.
    tools:
    - name: search-publications
      description: 'Search Springer Nature''s 14M+ scholarly publications. Use field qualifiers: doi:10.1007/..., title:machine
        learning, author:Smith, issn:0028-4793, subject:Computer Science, onlinedatefrom:2024-01-01'
      hints:
        readOnly: true
        openWorld: true
      call: springer-nature-meta.search-publications
      with:
        q: tools.query
        s: tools.start
        p: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: search-open-access-articles
      description: Search Springer Nature open access articles and chapters that are freely available. Returns metadata with
        links to full-text HTML and PDF content.
      hints:
        readOnly: true
        openWorld: true
      call: springer-nature-openaccess.search-open-access
      with:
        q: tools.query
        s: tools.start
        p: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: find-publications-by-doi
      description: Look up a specific Springer Nature publication by its DOI
      hints:
        readOnly: true
        openWorld: false
      call: springer-nature-meta.search-publications
      with:
        q: tools.doi
        p: '1'
      outputParameters:
      - type: object
        mapping: $.
    - name: find-publications-by-author
      description: Find all Springer Nature publications by a specific author name
      hints:
        readOnly: true
        openWorld: true
      call: springer-nature-meta.search-publications
      with:
        q: tools.authorQuery
        s: tools.start
        p: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: find-journal-articles
      description: Find articles published in a specific Springer Nature journal by ISSN
      hints:
        readOnly: true
        openWorld: true
      call: springer-nature-meta.search-publications
      with:
        q: tools.issnQuery
        s: tools.start
        p: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
