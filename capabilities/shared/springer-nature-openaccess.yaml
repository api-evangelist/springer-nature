naftiko: "1.0.0-alpha1"

info:
  label: "Springer Nature Open Access API"
  description: "Free access to open access research articles and book chapters from Springer Nature. Returns metadata and full-text links for OA publications."
  tags:
    - Academic Publishing
    - Full Text
    - Open Access
    - Research
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPRINGER_NATURE_API_KEY: SPRINGER_NATURE_API_KEY

capability:
  consumes:
    - type: http
      namespace: springer-nature-openaccess
      baseUri: https://api.springernature.com/openaccess
      description: "Springer Nature Open Access content API"
      authentication:
        type: apikey
        key: X-ApiKey
        value: "{{env.SPRINGER_NATURE_API_KEY}}"
        placement: header
      resources:
        - name: open-access-search
          path: /json
          description: "Search open access publications"
          operations:
            - name: search-open-access
              method: GET
              description: "Search open access articles and chapters"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Search query with field qualifiers"
                - name: s
                  in: query
                  type: integer
                  required: false
                  description: "Start record (1-based)"
                - name: p
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: springer-openaccess-api
      resources:
        - path: /v1/open-access
          name: open-access
          description: "Search open access Springer Nature content"
          operations:
            - method: GET
              name: search-open-access
              description: "Search open access publications"
              call: "springer-nature-openaccess.search-open-access"
              with:
                q: "rest.q"
                s: "rest.s"
                p: "rest.p"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: springer-openaccess-mcp
      transport: http
      tools:
        - name: search-open-access
          description: "Search freely accessible open access articles and book chapters from Springer Nature"
          hints:
            readOnly: true
            openWorld: true
          call: "springer-nature-openaccess.search-open-access"
          with:
            q: "tools.query"
            s: "tools.start"
            p: "tools.pageSize"
          outputParameters:
            - type: object
              mapping: "$."
