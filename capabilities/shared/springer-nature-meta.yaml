naftiko: "1.0.0-alpha1"

info:
  label: "Springer Nature Meta API"
  description: "Versioned metadata search for Springer Nature's 14M+ scholarly publications including journal articles, book chapters, and books."
  tags:
    - Academic Publishing
    - Bibliometrics
    - Metadata
    - Research
    - Scholarly Content
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPRINGER_NATURE_API_KEY: SPRINGER_NATURE_API_KEY

capability:
  consumes:
    - type: http
      namespace: springer-nature-meta
      baseUri: https://api.springernature.com/meta/v2
      description: "Springer Nature versioned metadata API"
      authentication:
        type: apikey
        key: X-ApiKey
        value: "{{env.SPRINGER_NATURE_API_KEY}}"
        placement: header
      resources:
        - name: metadata-search
          path: /json
          description: "Search Springer Nature publication metadata"
          operations:
            - name: search-publications
              method: GET
              description: "Search metadata for scholarly publications with field qualifiers"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Query string with field qualifiers (doi:, title:, author:, issn:, subject:)"
                - name: s
                  in: query
                  type: integer
                  required: false
                  description: "Start record (1-based)"
                - name: p
                  in: query
                  type: integer
                  required: false
                  description: "Results per page (max 100)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: springer-meta-api
      resources:
        - path: /v1/publications
          name: publications
          description: "Search Springer Nature publication metadata"
          operations:
            - method: GET
              name: search-publications
              description: "Search publications by keyword, author, DOI, or ISSN"
              call: "springer-nature-meta.search-publications"
              with:
                q: "rest.q"
                s: "rest.s"
                p: "rest.p"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: springer-meta-mcp
      transport: http
      tools:
        - name: search-publications
          description: "Search Springer Nature scholarly publication metadata by keyword, author, DOI, journal ISSN, or subject"
          hints:
            readOnly: true
            openWorld: true
          call: "springer-nature-meta.search-publications"
          with:
            q: "tools.query"
            s: "tools.start"
            p: "tools.pageSize"
          outputParameters:
            - type: object
              mapping: "$."
