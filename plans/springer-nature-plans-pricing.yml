specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Springer Nature
providerId: springer-nature
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Academic Publishing
  - Open Access
  - Research
  - Scholarly Content
  - Scientific Publishing
description: Springer Nature publishes a Basic developer API portal (Meta API, Open Access API, TDM / Full Text API) and announces a Premium API tier with higher rate limits and advanced features. The dev.springernature.com portal renders pricing and quota numbers behind a JavaScript-gated subscription page that is not publicly scrapeable; numeric per-day limits and Premium pricing must be obtained via the portal sign-up flow or by contacting the Springer Nature API team directly.
sources:
  - https://dev.springernature.com/
  - https://dev.springernature.com/docs
notes: Pricing and per-tier quotas are gated behind the dev.springernature.com sign-up flow and a JavaScript-rendered subscription page. Plan names ("Basic API", "Premium API") and the existence of a Premium tier are documented on the portal landing page; concrete numeric quotas are not.
plans:
  - id: springer-nature-contact-sales
    name: Contact Sales
    type: enterprise
    description: Springer Nature offers a Basic developer API tier (free key, modest daily quota) and a Premium API tier with higher rate limits and advanced features. Concrete quota numbers and Premium pricing are not publicly published; obtain them via the dev.springernature.com sign-up flow or by contacting the Springer Nature API team.
    entries:
      - label: API Subscription
        name: api_subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Meta API (Metadata)
      - name: Open Access API (Full Text)
      - name: Full Text API / TDM (Premium)
      - name: Personalised API Support
maintainers:
  - name: Springer Nature
    url: https://dev.springernature.com/
