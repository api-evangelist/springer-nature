principles:
  - name: Visibility
    description: The dev.springernature.com portal shows daily quota consumption per registered API key; consumers can monitor usage there. The Premium tier presumably exposes richer reporting through the account team but is not publicly documented.
  - name: Allocation
    description: Issue one API key per consuming application or research workflow so daily-quota consumption is allocable to the team that owns the key.
  - name: Optimization
    description: Cache Meta API metadata responses aggressively (publication metadata is stable), batch DOI lookups where the API supports it, and limit Full-Text / TDM calls to documents not already in local repository to avoid re-fetch.
  - name: Accountability
    description: Library / research-data team typically owns the Springer Nature API contract and its Premium upgrade decision; consuming research teams accept fair-use limits per key.
