specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Springer Nature
providerId: springer-nature
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Academic Publishing
  - Open Access
  - Research
  - Scholarly Content
  - Rate Limiting
description: Springer Nature documents that its Basic developer API has a daily quota and that a Premium API tier provides higher rate limits, but the concrete numeric thresholds are gated behind the dev.springernature.com portal sign-up and a JavaScript-rendered subscription page. Numbers are not scrapeable from the public docs landing.
sources:
  - https://dev.springernature.com/
  - https://dev.springernature.com/docs
notes: Per-day request quota and Premium-tier numeric limits are not on a publicly fetchable page. Sign in to the developer portal or contact api@springernature.com for the current values.
responseCodes:
  throttled: 429
limits:
  - name: Basic API Daily Quota
    scope: api-key
    metric: requests_per_day
    limit: see dev.springernature.com after sign-up
    notes: A daily quota is enforced per registered API key on the Basic tier; the exact number is shown in the developer portal after account creation.
  - name: Premium API Quota
    scope: api-key/contract
    metric: varies
    limit: higher than Basic; per Premium contract
    notes: Premium API documented as offering higher rate limits and advanced features; specifics are not published openly.
policies:
  - name: Quota Reset
    description: Daily quotas on the Basic tier reset on a 24-hour rolling or calendar-day window; consult the portal for the exact reset semantics.
  - name: Upgrade Path
    description: When Basic quota is insufficient, Springer Nature directs users to the Premium API tier rather than offering published per-call overage pricing.
maintainers:
  - name: Springer Nature
    url: https://dev.springernature.com/
